<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>VN-GO Travel</title>
    <style>
      :root {
        --bg: #0f1419;
        --card: #1a2332;
        --text: #e8eaed;
        --muted: #9aa0a6;
        --accent: #34a853;
        --accent-hover: #2d8f47;
        --border: #2d3a4d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        background: var(--bg);
        color: var(--text);
      }

      .card {
        width: 100%;
        max-width: 420px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 28px 24px;
        text-align: center;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
      }

      .logo {
        font-size: 1.5rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        margin-bottom: 8px;
      }

      .tagline {
        color: var(--muted);
        font-size: 0.95rem;
        line-height: 1.5;
        margin: 0 0 24px;
      }

      h1 {
        font-size: 1.25rem;
        font-weight: 600;
        margin: 0 0 12px;
      }

      p.sub {
        color: var(--muted);
        font-size: 0.9rem;
        line-height: 1.55;
        margin: 0 0 20px;
      }

      .spinner {
        width: 40px;
        height: 40px;
        margin: 8px auto 20px;
        border: 3px solid var(--border);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.85s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .actions {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-top: 8px;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        padding: 14px 20px;
        border-radius: 14px;
        font-size: 1rem;
        font-weight: 600;
        text-decoration: none;
        border: none;
        cursor: pointer;
        transition: background 0.2s, transform 0.05s;
      }

      .btn:active {
        transform: scale(0.98);
      }

      .btn-primary {
        background: var(--accent);
        color: #fff;
      }

      .btn-primary:hover {
        background: var(--accent-hover);
      }

      .btn-secondary {
        background: transparent;
        color: var(--text);
        border: 1px solid var(--border);
      }

      .btn-secondary:hover {
        background: rgba(255, 255, 255, 0.06);
      }

      .err {
        color: #f28b82;
        font-size: 0.88rem;
        margin-top: 12px;
      }

      footer {
        margin-top: 20px;
        font-size: 0.75rem;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div class="card" id="root" aria-live="polite"></div>

    <script>
      (function () {
        /** Must match MauiApp1.csproj ApplicationId (Android package name). */
        var ANDROID_PACKAGE = "com.companyname.mauiapp1";
        var BASE_URL = "https://thuyetminh.netlify.app";
        var APK_URL = BASE_URL + "/vngo.apk";

        var root = document.getElementById("root");

        function getScanToken() {
          var params = new URLSearchParams(window.location.search || "");
          var t = params.get("t");
          if (t && t.trim()) return t.trim();
          return null;
        }

        function isScanRoute() {
          var path = (window.location.pathname || "").replace(/\/+$/, "") || "/";
          if (path.toLowerCase() === "/scan") return true;
          if (path.toLowerCase().endsWith("/scan")) return true;
          return false;
        }

        /**
         * Same URL shape as QrResolver (MAUI): https://thuyetminh.netlify.app/scan?t=<JWT>
         * intent:// + scheme=https + package=... so Chrome routes VIEW to VN-GO, not Translate.
         */
        function buildAndroidIntentUrl(token) {
          var encToken = encodeURIComponent(token);
          var fallback = encodeURIComponent(BASE_URL + "/?install=1#download");
          return (
            "intent://thuyetminh.netlify.app/scan?t=" +
            encToken +
            "#Intent;scheme=https;package=" +
            ANDROID_PACKAGE +
            ";action=android.intent.action.VIEW;category=android.intent.category.DEFAULT;category=android.intent.category.BROWSABLE;S.browser_fallback_url=" +
            fallback +
            ";end"
          );
        }

        function tryOpenApp(token) {
          window.location.href = buildAndroidIntentUrl(token);
        }

        function renderLanding() {
          root.innerHTML =
            '<div class="logo">VN-GO Travel</div>' +
            '<p class="tagline">Ch\u00e0o m\u1eebng b\u1ea1n \u0111\u1ebfn v\u1edbi \u1ee9ng d\u1ee5ng du l\u1ecbch thuy\u1ebft minh \u0111\u1ecba \u0111i\u1ec3m.</p>' +
            '<div class="actions">' +
            '<a class="btn btn-primary" href="' +
            APK_URL +
            '" id="dl-apk">T\u1ea3i \u1ee9ng d\u1ee5ng (APK)</a>' +
            "</div>" +
            '<footer>Qu\u00e9t m\u00e3 QR \u0111\u1ec3 m\u1edf \u0111\u1ecba \u0111i\u1ec3m trong app.</footer>';
        }

        function renderScanMissingToken() {
          root.innerHTML =
            '<h1>Thi\u1ebfu m\u00e3 truy c\u1eadp</h1>' +
            '<p class="sub">Li\u00ean k\u1ebft kh\u00f4ng c\u00f3 tham s\u1ed1 <code style="color:var(--text)">t</code> (token). Vui l\u00f2ng qu\u00e9t l\u1ea1i m\u00e3 QR.</p>' +
            '<div class="actions">' +
            '<a class="btn btn-secondary" href="' +
            BASE_URL +
            '/">V\u1ec1 trang ch\u1ee7</a>' +
            '<a class="btn btn-primary" href="' +
            APK_URL +
            '">T\u1ea3i \u1ee9ng d\u1ee5ng (APK)</a>' +
            "</div>";
        }

        function renderScanWithToken(token) {
          root.innerHTML =
            '<div class="spinner" aria-hidden="true"></div>' +
            "<h1>\u0110ang m\u1edf \u1ee9ng d\u1ee5ng\u2026</h1>" +
            "<p class=\"sub\">N\u1ebfu app VN-GO kh\u00f4ng m\u1edf, ch\u1ecdn <strong>M\u1edf \u1ee9ng d\u1ee5ng</strong> ho\u1eb7c <strong>T\u1ea3i \u1ee9ng d\u1ee5ng</strong> b\u00ean d\u01b0\u1edbi.</p>" +
            '<div class="actions">' +
            '<button type="button" class="btn btn-primary" id="btn-open">M\u1edf \u1ee9ng d\u1ee5ng</button>' +
            '<a class="btn btn-secondary" href="' +
            APK_URL +
            '" id="btn-dl">T\u1ea3i \u1ee9ng d\u1ee5ng (APK)</a>' +
            "</div>" +
            '<footer>\u1ee8ng d\u1ee5ng s\u1ebd x\u00e1c th\u1ef1c token v\u1edbi m\u00e1y ch\u1ee7. Web ch\u1ec9 chuy\u1ec3n ti\u1ebfp li\u00ean k\u1ebft.</footer>';

          document.getElementById("btn-open").addEventListener("click", function () {
            tryOpenApp(token);
          });

          setTimeout(function () {
            tryOpenApp(token);
          }, 500);
        }

        function boot() {
          var token = getScanToken();

          if (isScanRoute()) {
            if (!token) {
              renderScanMissingToken();
              return;
            }
            renderScanWithToken(token);
            return;
          }

          if (token) {
            renderScanWithToken(token);
            return;
          }

          renderLanding();
        }

        boot();
      })();
    </script>
  </body>
</html>
